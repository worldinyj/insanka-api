{% extends "base.html" %}

{% block title %}게시판 - 인산가{% endblock %}

{% block content %}
<div class="max-w-4xl w-full" x-data="{
    slug: '{{ slug }}',
    cursor: null,
    posts: [],
    loading: false,
    hasMore: true,
    async loadPosts() {
        if (this.loading || !this.hasMore) return;
        this.loading = true;
        let url = `/api/v1/rooms/${this.slug}/posts`;
        if (this.cursor) {
            url += `?cursor=${this.cursor}`;
        }
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.posts.length > 0) {
                this.posts.push(...data.posts);
                this.cursor = data.posts[data.posts.length - 1].id;
                if (data.posts.length < 20) {
                    this.hasMore = false;
                }
            } else {
                this.hasMore = false;
            }
        } catch (e) {
            console.error('Failed to load posts', e);
        } finally {
            this.loading = false;
        }
    }
}" x-init="loadPosts()">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl sm:text-2xl font-bold text-text-primary">게시판 ({{ slug }})</h1>
        <a :href="`/room/${slug}/write`" class="px-4 py-2 bg-accent text-bg-base font-semibold rounded-md hover:bg-opacity-90 transition shadow-sm text-sm sm:text-base whitespace-nowrap ml-4">
            글쓰기
        </a>
    </div>

    <!-- Vote component area (Optional) -->
    <div class="mb-6">
        {% include 'components/vote.html' ignore missing %}
    </div>

    <div class="bg-bg-surface border border-border rounded-xl shadow-lg overflow-hidden">
        <ul class="divide-y divide-border">
            <template x-for="post in posts" :key="post.id">
                <li>
                    <a :href="`/post/${post.id}`" class="block p-4 sm:p-5 hover:bg-bg-raised transition">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-2 gap-2 sm:gap-0">
                            <div class="flex items-center space-x-2 text-xs sm:text-sm text-text-secondary">
                                <span class="bg-accent bg-opacity-20 text-accent px-2 py-0.5 rounded-full font-bold" x-text="`Lv.${post.author.level}`"></span>
                                <span class="font-medium text-text-primary" x-text="post.author.username"></span>
                                <span class="hidden sm:inline">•</span>
                                <span x-text="new Date(post.created_at).toLocaleDateString()" class="text-text-muted sm:text-text-secondary"></span>
                            </div>
                        </div>
                        <h2 class="text-lg sm:text-xl font-bold text-text-primary mb-2 leading-snug" x-text="post.title"></h2>
                        <p class="text-sm sm:text-base text-text-secondary line-clamp-2 mb-4" x-text="post.content_preview"></p>
                        
                        <div class="flex items-center space-x-6 text-sm text-text-muted">
                            <div class="flex items-center space-x-1 hover:text-text-primary transition">
                                <span>👍</span>
                                <span x-text="post.likes"></span>
                            </div>
                            <div class="flex items-center space-x-1 hover:text-text-primary transition">
                                <span>💬</span>
                                <span x-text="post.comments"></span>
                            </div>
                        </div>
                    </a>
                </li>
            </template>
            <template x-if="posts.length === 0 && !loading">
                <li class="p-12 text-center text-text-secondary">아직 작성된 글이 없습니다. 첫 글의 주인공이 되어보세요!</li>
            </template>
        </ul>
        
        <!-- Infinite Scroll Trigger -->
        <div x-intersect="loadPosts()" class="h-10 flex items-center justify-center">
            <template x-if="loading">
                <span class="text-text-muted text-sm">로딩 중...</span>
            </template>
        </div>
    </div>
</div>
{% endblock %}
