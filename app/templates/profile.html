{% extends "base.html" %}

{% block title %}내 프로필 - 인산가{% endblock %}

{% block content %}
<div class="max-w-4xl w-full" x-data="{
    profile: null,
    async loadProfile() {
        const res = await fetch('/api/v1/users/me/points');
        this.profile = await res.json();
    },
    getProgress(points, level) {
        // Mock threshold logic, must match backend
        const thresholds = {1:0, 2:100, 3:500, 4:2000, 5:10000};
        const currentThresh = thresholds[level] || 0;
        const nextThresh = thresholds[level+1] || currentThresh;
        if (nextThresh === currentThresh) return 100;
        return Math.min(100, Math.max(0, ((points - currentThresh) / (nextThresh - currentThresh)) * 100));
    },
    getNextLevelPoints(level) {
        const thresholds = {1:0, 2:100, 3:500, 4:2000, 5:10000};
        return thresholds[level+1] || 'MAX';
    }
}" x-init="loadProfile()">

    <template x-if="profile">
        <div class="space-y-6">
            <!-- Level and Progress -->
            <div class="bg-bg-surface border border-border p-5 sm:p-8 rounded-xl shadow-lg">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-4 sm:gap-0">
                    <div>
                        <h1 class="text-xl sm:text-2xl font-bold text-text-primary">내 정보</h1>
                        <p class="text-sm sm:text-base text-text-secondary mt-1">현재 등급 및 포인트 현황</p>
                    </div>
                    <div class="text-left sm:text-right">
                        <div class="text-2xl sm:text-3xl font-bold text-accent">Lv <span x-text="profile.level"></span></div>
                        <div class="text-text-secondary text-xs sm:text-sm"><span x-text="profile.total_points"></span> pts</div>
                    </div>
                </div>

                <div class="mt-6">
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-text-secondary">다음 레벨까지</span>
                        <span class="text-text-primary font-medium">
                            <span x-text="profile.total_points"></span> / <span x-text="getNextLevelPoints(profile.level)"></span>
                        </span>
                    </div>
                    <div class="w-full bg-bg-base rounded-full h-3">
                        <div class="bg-accent h-3 rounded-full transition-all duration-500" :style="`width: ${getProgress(profile.total_points, profile.level)}%`"></div>
                    </div>
                </div>
            </div>

            <!-- Point Logs -->
            <div class="bg-bg-surface border border-border rounded-xl shadow-lg overflow-hidden">
                <div class="px-4 sm:px-6 py-3 sm:py-4 border-b border-border">
                    <h2 class="text-base sm:text-lg font-bold text-text-primary">최근 활동 내역</h2>
                </div>
                <ul class="divide-y divide-border">
                    <template x-for="log in profile.logs" :key="log.id">
                        <li class="px-4 sm:px-6 py-3 sm:py-4 flex flex-row justify-between items-center hover:bg-bg-raised transition">
                            <div class="flex-1 mr-4">
                                <span class="text-sm sm:text-base text-text-primary font-medium line-clamp-1" x-text="
                                    log.reason === 'signup_approved' ? '가입 승인' :
                                    log.reason === 'post_created' ? '게시글 작성' :
                                    log.reason === 'comment_created' ? '댓글 작성' :
                                    log.reason === 'like_received' ? '게시글 좋아요 받음' : log.reason
                                "></span>
                                <div class="text-xs sm:text-sm text-text-muted mt-0.5" x-text="new Date(log.created_at).toLocaleString()"></div>
                            </div>
                            <div class="font-bold shrink-0 text-base sm:text-lg" :class="log.amount > 0 ? 'text-accent' : 'text-danger'">
                                <span x-text="log.amount > 0 ? '+' : ''"></span><span x-text="log.amount"></span>
                            </div>
                        </li>
                    </template>
                    <template x-if="profile.logs.length === 0">
                        <li class="p-8 text-center text-text-secondary">아직 활동 내역이 없습니다.</li>
                    </template>
                </ul>
            </div>
        </div>
    </template>
</div>
{% endblock %}
