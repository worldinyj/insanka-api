<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}인산가 커뮤니티{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: {
                            base: '#0D1117',
                            surface: '#161B22',
                            raised: '#21262D',
                        },
                        border: '#30363D',
                        accent: {
                            DEFAULT: '#00C896',
                            dim: '#00C89620'
                        },
                        danger: '#E8453C',
                        warning: '#F0B429',
                        info: '#3B82F6',
                        text: {
                            primary: '#E6EDF3',
                            secondary: '#8B949E',
                            muted: '#484F58'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0D1117; color: #E6EDF3; }
    </style>
    <script>
        window.showToast = function(message, type = 'success') {
            window.dispatchEvent(new CustomEvent('show-toast', { detail: { message, type } }));
        }
    </script>
</head>
<body class="antialiased min-h-screen flex flex-col relative"
      x-data="{ toasts: [] }"
      @show-toast.window="
          const toast = { id: Date.now(), message: $event.detail.message, type: $event.detail.type };
          toasts.push(toast);
          setTimeout(() => { toasts = toasts.filter(t => t.id !== toast.id) }, 3000);
      ">
    
    <!-- Toast Container -->
    <div class="fixed top-20 right-4 z-[100] flex flex-col space-y-2 pointer-events-none w-72 max-w-[calc(100vw-2rem)]">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-show="true"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-x-8"
                 x-transition:enter-end="opacity-100 translate-x-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-x-0"
                 x-transition:leave-end="opacity-0 translate-x-8"
                 class="px-4 py-3 rounded shadow-lg text-sm font-medium text-white pointer-events-auto flex items-center shadow-black/50"
                 :class="toast.type === 'success' ? 'bg-accent' : toast.type === 'error' ? 'bg-danger' : 'bg-info'">
                 
                 <!-- Icon -->
                 <div class="mr-3 shrink-0">
                     <span x-show="toast.type === 'success'">✅</span>
                     <span x-show="toast.type === 'error'">⚠️</span>
                     <span x-show="toast.type === 'info'">ℹ️</span>
                 </div>
                 
                 <span x-text="toast.message" class="leading-snug break-keep"></span>
            </div>
        </template>
    </div>
    <!-- Topbar -->
    <header class="h-16 sticky top-0 z-50 bg-bg-surface border-b border-border flex items-center px-6 justify-between"
            x-data="{ 
                user: null,
                async initUser() {
                    try {
                        const res = await fetch('/api/v1/users/me');
                        if (res.ok) this.user = await res.json();
                    } catch(e) {}
                }
            }"
            x-init="initUser()">
        <a href="/room/general" class="text-accent font-bold text-xl hover:opacity-80 transition shrink-0">🔷 인산가</a>
        
        <!-- Header Right -->
        <div class="flex items-center space-x-3 sm:space-x-6 text-sm">
            <template x-if="user">
                <div class="flex items-center space-x-3 sm:space-x-4">
                    <a href="/profile" class="text-text-secondary hover:text-text-primary transition flex items-center space-x-1 sm:space-x-2">
                        <span class="bg-accent bg-opacity-20 text-accent px-2 py-0.5 rounded-full text-xs font-bold" x-text="`Lv.${user.level}`"></span>
                        <span x-text="`${user.username}님`" class="hidden sm:inline"></span>
                    </a>
                    <a href="/ranking" class="text-text-secondary hover:text-text-primary transition hidden sm:inline">🏆 랭킹</a>
                    <a href="/admin" x-show="user.role === 'admin'" class="text-text-secondary hover:text-text-primary transition hidden sm:inline">🛠️ 관리자</a>
                    <button @click="await fetch('/api/v1/auth/logout', {method:'POST'}); window.location.href='/login'" class="text-text-secondary hover:text-text-primary transition">로그아웃</button>
                </div>
            </template>
            <template x-if="!user">
                <div class="flex items-center space-x-4">
                    <a href="/login" class="text-accent font-medium hover:underline transition">로그인</a>
                </div>
            </template>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex justify-center max-w-7xl mx-auto w-full px-4 sm:px-6 md:px-8 pt-6 pb-12">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
