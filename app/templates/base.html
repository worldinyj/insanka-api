<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}인산가 커뮤니티{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: {
                            base: '#0D1117',
                            surface: '#161B22',
                            raised: '#21262D',
                        },
                        border: '#30363D',
                        accent: {
                            DEFAULT: '#00C896',
                            dim: '#00C89620'
                        },
                        danger: '#E8453C',
                        warning: '#F0B429',
                        info: '#3B82F6',
                        text: {
                            primary: '#E6EDF3',
                            secondary: '#8B949E',
                            muted: '#484F58'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0D1117; color: #E6EDF3; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">
    <!-- Topbar -->
    <header class="h-16 sticky top-0 z-50 bg-bg-surface border-b border-border flex items-center px-6 justify-between">
        <div class="text-accent font-bold text-xl">🔷 인산가</div>
        <!-- Header Right -->
        <div class="flex items-center space-x-6">
            <button type="button" class="text-text-secondary hover:text-text-primary">🔔 알림</button>
            <button type="button" class="text-text-secondary hover:text-text-primary">👤 프로필</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex justify-center max-w-7xl mx-auto w-full pt-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
