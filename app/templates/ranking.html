{% extends "base.html" %}

{% block title %}랭킹 - 인산가{% endblock %}

{% block content %}
<div class="max-w-4xl w-full" x-data="{
    ranking: [],
    async loadRanking() {
        const res = await fetch('/api/v1/users/ranking');
        const data = await res.json();
        this.ranking = data.ranking;
    }
}" x-init="loadRanking()">

    <div class="flex justify-between items-center mb-4 sm:mb-6">
        <div>
            <h1 class="text-2xl sm:text-3xl font-bold text-text-primary">명예의 전당 🏆</h1>
            <p class="text-sm sm:text-base text-text-secondary mt-1 sm:mt-2">인산가 커뮤니티 활동 랭킹입니다.</p>
        </div>
    </div>

    <div class="bg-bg-surface border border-border rounded-xl shadow-lg overflow-hidden">
        <ul class="divide-y divide-border">
            <template x-for="(user, index) in ranking" :key="user.id">
                <li class="flex items-center px-4 sm:px-6 py-3 sm:py-4 hover:bg-bg-raised transition" :class="index < 3 ? 'bg-accent-dim bg-opacity-5' : ''">
                    <!-- Rank -->
                    <div class="w-8 sm:w-12 text-center font-bold text-lg sm:text-xl shrink-0" 
                         :class="index === 0 ? 'text-warning' : index === 1 ? 'text-text-primary' : index === 2 ? 'text-[#cd7f32]' : 'text-text-muted'">
                        <span x-show="index === 0">🥇</span>
                        <span x-show="index === 1">🥈</span>
                        <span x-show="index === 2">🥉</span>
                        <span x-show="index > 2" x-text="index + 1"></span>
                    </div>

                    <!-- User Info -->
                    <div class="flex-1 ml-3 sm:ml-4 overflow-hidden">
                        <div class="text-text-primary font-bold text-base sm:text-lg flex flex-wrap items-center gap-1 sm:gap-2">
                            <span x-text="user.username" class="truncate max-w-[120px] sm:max-w-none"></span>
                            <span class="text-[10px] sm:text-xs px-1.5 sm:px-2 py-0.5 sm:py-1 bg-bg-base border border-border rounded text-text-secondary whitespace-nowrap">Lv <span x-text="user.level"></span></span>
                        </div>
                    </div>

                    <!-- Points -->
                    <div class="text-right shrink-0">
                        <div class="text-accent font-bold text-base sm:text-lg"><span x-text="user.total_points"></span> <span class="text-xs sm:text-sm font-normal">pts</span></div>
                    </div>
                </li>
            </template>
        </ul>
    </div>
</div>
{% endblock %}
