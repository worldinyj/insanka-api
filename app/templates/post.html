{% extends "base.html" %}

{% block title %}게시글 - 인산가{% endblock %}

{% block content %}
<div class="max-w-4xl w-full bg-bg-surface border border-border rounded-xl shadow-lg p-8" x-data="{
    postId: {{ post_id }},
    post: null,
    comments: [],
    newComment: '',
    async loadPost() {
        const res = await fetch(`/api/v1/posts/${this.postId}`);
        const data = await res.json();
        this.post = data;
        this.comments = data.comments;
    },
    async toggleLike() {
        const res = await fetch(`/api/v1/posts/${this.postId}/like`, { method: 'POST' });
        if (res.ok) {
            const data = await res.json();
            if (data.status === 'liked') this.post.likes += 1;
            else this.post.likes -= 1;
        }
    },
    async submitComment() {
        if(!this.newComment.trim()) return;
        const res = await fetch(`/api/v1/posts/${this.postId}/comments`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ content: this.newComment })
        });
        if(res.ok) {
            this.newComment = '';
            await this.loadPost();
        }
    }
}" x-init="loadPost()">

    <template x-if="post">
        <div>
            <!-- Header -->
            <div class="border-b border-border pb-6 mb-6">
                <h1 class="text-3xl font-bold text-text-primary mb-4" x-text="post.title"></h1>
                <div class="flex items-center text-sm text-text-secondary space-x-3">
                    <span class="bg-accent bg-opacity-20 text-accent px-2 py-0.5 rounded-full text-xs font-bold" x-text="`Lv.${post.author.level}`"></span>
                    <span class="font-medium text-text-primary" x-text="post.author.username"></span>
                    <span>•</span>
                    <span x-text="new Date(post.created_at).toLocaleString()"></span>
                </div>
            </div>

            <!-- Content -->
            <div class="prose prose-invert max-w-none text-text-primary mb-8 min-h-[200px]" x-text="post.content">
            </div>

            <!-- Actions -->
            <div class="flex items-center justify-between mb-8 border-b border-border pb-8">
                <div class="flex space-x-4 text-text-muted">
                    <span x-text="`💬 댓글 ${comments.length}개`"></span>
                </div>
                <button type="button" @click="toggleLike()" class="flex items-center space-x-2 px-6 py-2 rounded-full border border-border hover:bg-bg-raised transition" :class="{'text-accent border-accent': post.likes > 0, 'text-text-primary': post.likes === 0}">
                    <span>👍</span>
                    <span class="font-medium" x-text="`좋아요 ${post.likes || ''}`"></span>
                </button>
            </div>

            <!-- Comments Section -->
            <div x-data="{ submitting: false }">
                <h3 class="text-xl font-bold text-text-primary mb-4">댓글 (<span x-text="comments.length"></span>)</h3>
                
                <form @submit.prevent="async () => { 
                    submitting = true; 
                    await submitComment(); 
                    submitting = false; 
                }" class="mb-6 flex space-x-2">
                    <input type="text" x-model="newComment" :disabled="submitting" placeholder="댓글을 입력하세요" class="flex-1 px-4 py-2 bg-bg-base border border-border rounded-md focus:border-accent focus:outline-none transition disabled:opacity-50">
                    <button type="submit" :disabled="submitting" class="px-6 py-2 bg-accent text-bg-base font-semibold rounded-md hover:bg-opacity-90 transition disabled:opacity-50" x-text="submitting ? '등록 중...' : '등록'"></button>
                </form>

                <ul class="space-y-4">
                    <template x-for="comment in comments" :key="comment.id">
                        <li class="bg-bg-raised p-4 rounded-lg border border-border">
                            <div class="flex items-center space-x-2 text-sm text-text-secondary mb-2">
                                <span class="bg-info bg-opacity-20 text-info px-1.5 py-0.5 rounded text-xs font-bold" x-text="`Lv.${comment.author.level}`"></span>
                                <span class="font-medium text-text-primary" x-text="comment.author.username"></span>
                                <span>•</span>
                                <span class="text-xs" x-text="new Date(comment.created_at).toLocaleString()"></span>
                            </div>
                            <div class="text-text-primary" x-text="comment.content"></div>
                        </li>
                    </template>
                </ul>
            </div>
        </div>
    </template>
</div>
{% endblock %}
