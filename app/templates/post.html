{% extends "base.html" %}

{% block title %}게시글 - 인산가{% endblock %}

{% block content %}
<div class="max-w-4xl w-full bg-bg-surface border border-border rounded-xl shadow-lg p-4 sm:p-8" x-data="{
    postId: {{ post_id }},
    post: null,
    comments: [],
    get commentTree() {
        const roots = this.comments.filter(c => !c.parent_id);
        roots.forEach(root => {
            root.replies = this.comments.filter(c => c.parent_id === root.id);
        });
        return roots;
    },
    replyingTo: null,
    replyContent: '',
    newComment: '',
    async loadPost() {
        const res = await fetch(`/api/v1/posts/${this.postId}`);
        const data = await res.json();
        this.post = data;
        this.comments = data.comments;
    },
    async toggleLike() {
        const res = await fetch(`/api/v1/posts/${this.postId}/like`, { method: 'POST' });
        if (res.ok) {
            const data = await res.json();
            if (data.status === 'liked') this.post.likes += 1;
            else this.post.likes -= 1;
        } else {
            showToast('오류가 발생했습니다.', 'error');
        }
    },
    async submitComment() {
        if(!this.newComment.trim()) return;
        const res = await fetch(`/api/v1/posts/${this.postId}/comments`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ content: this.newComment })
        });
        if(res.ok) {
            this.newComment = '';
            await this.loadPost();
            showToast('댓글이 등록되었습니다.', 'success');
        } else {
            showToast('댓글 등록에 실패했습니다.', 'error');
        }
    },
    async submitReply(parentId) {
        if(!this.replyContent.trim()) return;
        const res = await fetch(`/api/v1/posts/${this.postId}/comments`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ content: this.replyContent, parent_id: parentId })
        });
        if(res.ok) {
            this.replyContent = '';
            this.replyingTo = null;
            await this.loadPost();
            showToast('답글이 등록되었습니다.', 'success');
        } else {
            showToast('답글 등록에 실패했습니다.', 'error');
        }
    }
}" x-init="loadPost()">

    <template x-if="post">
        <div>
            <!-- Header -->
            <div class="border-b border-border pb-4 sm:pb-6 mb-4 sm:mb-6">
                <h1 class="text-2xl sm:text-3xl font-bold text-text-primary mb-3 sm:mb-4 leading-snug" x-text="post.title"></h1>
                <div class="flex flex-wrap items-center gap-2 text-xs sm:text-sm text-text-secondary">
                    <span class="bg-accent bg-opacity-20 text-accent px-2 py-0.5 rounded-full font-bold" x-text="`Lv.${post.author.level}`"></span>
                    <span class="font-medium text-text-primary" x-text="post.author.username"></span>
                    <span class="hidden sm:inline">•</span>
                    <span x-text="new Date(post.created_at).toLocaleString()" class="text-text-muted sm:text-text-secondary"></span>
                </div>
            </div>

            <!-- Content -->
            <div class="prose max-w-none text-text-primary mb-8 min-h-[200px]" x-text="post.content">
            </div>

            <!-- Actions -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 border-b border-border pb-6 sm:pb-8 gap-4 sm:gap-0">
                <div class="flex space-x-4 text-text-muted text-sm sm:text-base">
                    <span x-text="`💬 댓글 ${comments.length}개`"></span>
                </div>
                <button type="button" @click="toggleLike()" class="w-full sm:w-auto flex items-center justify-center space-x-2 px-6 py-2 rounded-full border border-border hover:bg-bg-raised transition" :class="{'text-accent border-accent': post.likes > 0, 'text-text-primary': post.likes === 0}">
                    <span>👍</span>
                    <span class="font-medium" x-text="`좋아요 ${post.likes || ''}`"></span>
                </button>
            </div>

            <!-- Comments Section -->
            <div x-data="{ submitting: false }">
                <h3 class="text-xl font-bold text-text-primary mb-4">댓글 (<span x-text="comments.length"></span>)</h3>
                
                <form @submit.prevent="async () => { 
                    submitting = true; 
                    await submitComment(); 
                    submitting = false; 
                }" class="mb-6 flex flex-col sm:flex-row gap-2">
                    <input type="text" x-model="newComment" :disabled="submitting" placeholder="댓글을 입력하세요" class="flex-1 px-4 py-2 bg-bg-base border border-border rounded-md focus:border-accent focus:outline-none transition disabled:opacity-50 text-sm sm:text-base">
                    <button type="submit" :disabled="submitting" class="px-6 py-2 bg-accent text-bg-base font-semibold rounded-md hover:bg-opacity-90 transition disabled:opacity-50 text-sm sm:text-base shrink-0" x-text="submitting ? '등록 중...' : '등록'"></button>
                </form>

                <ul class="space-y-4">
                    <template x-for="comment in commentTree" :key="comment.id">
                        <li class="bg-bg-raised p-4 rounded-lg border border-border">
                            <!-- Root Comment -->
                            <div class="flex items-center space-x-2 text-sm text-text-secondary mb-2">
                                <span class="bg-info bg-opacity-20 text-info px-1.5 py-0.5 rounded text-xs font-bold" x-text="`Lv.${comment.author.level}`"></span>
                                <span class="font-medium text-text-primary" x-text="comment.author.username"></span>
                                <span>•</span>
                                <span class="text-xs" x-text="new Date(comment.created_at).toLocaleString()"></span>
                            </div>
                            <div class="text-text-primary mb-2" x-text="comment.content"></div>
                            
                            <!-- Reply Button -->
                            <button @click="replyingTo = replyingTo === comment.id ? null : comment.id; replyContent = ''" class="text-xs text-text-secondary hover:text-text-primary transition flex items-center space-x-1">
                                <span>↳ 답글 달기</span>
                            </button>

                            <!-- Reply Form -->
                            <div x-show="replyingTo === comment.id" x-transition class="mt-3 ml-2 sm:ml-4 border-l-2 border-border pl-3 sm:pl-4">
                                <form @submit.prevent="submitReply(comment.id)" class="flex flex-col sm:flex-row gap-2">
                                    <input type="text" x-model="replyContent" placeholder="답글을 입력하세요" class="flex-1 px-3 py-1.5 bg-bg-base border border-border rounded-md focus:border-accent focus:outline-none transition text-sm">
                                    <button type="submit" class="px-4 py-1.5 bg-bg-surface border border-border text-text-primary font-medium rounded-md hover:bg-bg-raised transition text-sm shrink-0">등록</button>
                                </form>
                            </div>

                            <!-- Replies -->
                            <template x-if="comment.replies && comment.replies.length > 0">
                                <ul class="mt-4 ml-2 sm:ml-4 space-y-3 border-l-2 border-border pl-3 sm:pl-4">
                                    <template x-for="reply in comment.replies" :key="reply.id">
                                        <li class="bg-bg-base p-3 rounded-md border border-border">
                                            <div class="flex items-center space-x-2 text-sm text-text-secondary mb-1">
                                                <span class="bg-info bg-opacity-20 text-info px-1.5 py-0.5 rounded text-xs font-bold" x-text="`Lv.${reply.author.level}`"></span>
                                                <span class="font-medium text-text-primary" x-text="reply.author.username"></span>
                                                <span>•</span>
                                                <span class="text-xs" x-text="new Date(reply.created_at).toLocaleString()"></span>
                                            </div>
                                            <div class="text-text-primary text-sm" x-text="reply.content"></div>
                                        </li>
                                    </template>
                                </ul>
                            </template>

                        </li>
                    </template>
                </ul>
            </div>
        </div>
    </template>
</div>
{% endblock %}
