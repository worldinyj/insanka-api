{% extends "base.html" %}

{% block title %}회원가입 - 인산가{% endblock %}

{% block content %}
<div class="max-w-lg w-full bg-bg-surface border border-border p-8 rounded-xl shadow-lg mt-8" x-data="{ agreed: false }">
    <p class="text-text-secondary text-sm mb-8">안전한 주주 확인을 위해 신분증과 주주명부가 포함된 증빙을 업로드해주세요.</p>
    
    <form action="/api/v1/auth/invitations/{{ token }}/signup" method="POST" enctype="multipart/form-data" class="space-y-5" x-data="{ submitting: false }" @submit="submitting = true">
        <div>
            <label class="block text-sm font-medium text-text-secondary mb-1">이메일 (초대됨)</label>
            <input type="text" value="{{ email }}" disabled class="w-full px-4 py-2 bg-bg-base border border-border rounded-md text-text-muted cursor-not-allowed">
        </div>

        <div>
            <label class="block text-sm font-medium text-text-secondary mb-1">닉네임</label>
            <input type="text" name="username" required placeholder="활동할 닉네임 입력" class="w-full px-4 py-2 bg-bg-base border border-border rounded-md focus:border-accent focus:outline-none transition">
            <!-- HTMX for duplicate check can be added here -->
        </div>

        <div>
            <label class="block text-sm font-medium text-text-secondary mb-1">비밀번호</label>
            <input type="password" name="password" required placeholder="8자 이상, 숫자+특수문자 포함" class="w-full px-4 py-2 bg-bg-base border border-border rounded-md focus:border-accent focus:outline-none transition">
        </div>

        <div>
            <label class="block text-sm font-medium text-text-secondary mb-1">
                주주 인증 증빙 이미지 <span class="text-danger">*</span>
            </label>
            <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-border border-dashed rounded-md hover:border-accent transition cursor-pointer">
                <div class="space-y-1 text-center">
                    <svg class="mx-auto h-12 w-12 text-text-muted" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <div class="flex text-sm text-text-secondary">
                        <label for="file-upload" class="relative cursor-pointer rounded-md font-medium text-accent hover:text-info">
                            <span>파일 업로드</span>
                            <input id="file-upload" name="proof_image" type="file" class="sr-only" required accept="image/jpeg,image/png">
                        </label>
                        <p class="pl-1">또는 드래그 앤 드롭</p>
                    </div>
                    <p class="text-xs text-text-muted mt-1">※ 주민등록번호 뒷자리 등 민감 정보는 가리고 업로드해주세요.</p>
                </div>
            </div>
        </div>

        <div class="flex items-center mt-6 p-4 bg-bg-base rounded-md border border-border">
            <input id="rules" type="checkbox" x-model="agreed" class="h-4 w-4 text-accent border-border rounded bg-bg-surface focus:ring-accent">
            <label for="rules" class="ml-2 block text-sm text-text-secondary">
                <a href="/rules" target="_blank" class="text-info hover:underline">커뮤니티 회칙</a>을 확인하였으며 이에 동의합니다.
            </label>
        </div>

            가입 신청하기
        </button>
    </form>
</div>
{% endblock %}
